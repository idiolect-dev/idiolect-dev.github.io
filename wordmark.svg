<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 180" width="780" height="180" role="img" aria-label="idiolect">
  <title>idiolect</title>
  <!--
    Worn typewriter wordmark. Same Courier family, same worn filters,
    and same two-strike treatment as the logo stamp — the two assets
    read as coming from the same machine and the same ribbon. Letters
    sit on their natural monospace grid (no letter-spacing tweak);
    the edge-level displacement ripples within each letter's cell
    without shifting letters into their neighbors.
  -->
  <defs>
    <filter id="worn-primary" x="-4%" y="-20%" width="108%" height="140%">
      <feTurbulence type="fractalNoise" baseFrequency="0.15" numOctaves="2" seed="7" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="3.5" result="warped"/>
      <feGaussianBlur in="warped" stdDeviation="1.2"/>
    </filter>
    <filter id="worn-overlay" x="-4%" y="-20%" width="108%" height="140%">
      <feTurbulence type="fractalNoise" baseFrequency="0.22" numOctaves="2" seed="17" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="2" result="warped"/>
      <feGaussianBlur in="warped" stdDeviation="0.6"/>
    </filter>
  </defs>

  <!-- Primary ink strike. -->
  <g filter="url(#worn-primary)" opacity="0.92">
    <text x="40"
          y="130"
          font-family="'Courier New', 'Courier Prime', 'IBM Plex Mono', Courier, monospace"
          font-weight="900"
          font-size="140"
          fill="#1e293b">idiolect</text>
  </g>

  <!-- Density overlay. -->
  <g filter="url(#worn-overlay)" opacity="0.4">
    <text x="40"
          y="130"
          font-family="'Courier New', 'Courier Prime', 'IBM Plex Mono', Courier, monospace"
          font-weight="900"
          font-size="140"
          fill="#0f172a">idiolect</text>
  </g>

  <!-- Splatter across the paper. -->
  <g fill="#1e293b">
    <circle cx="18"  cy="40"  r="1.1" opacity="0.55"/>
    <circle cx="82"  cy="24"  r="0.8" opacity="0.7"/>
    <circle cx="156" cy="156" r="1.3" opacity="0.45"/>
    <circle cx="224" cy="36"  r="0.6" opacity="0.6"/>
    <circle cx="296" cy="160" r="1.0" opacity="0.5"/>
    <circle cx="368" cy="22"  r="0.7" opacity="0.55"/>
    <circle cx="440" cy="158" r="1.4" opacity="0.4"/>
    <circle cx="512" cy="30"  r="0.9" opacity="0.6"/>
    <circle cx="584" cy="160" r="1.2" opacity="0.5"/>
    <circle cx="656" cy="38"  r="1.0" opacity="0.55"/>
    <circle cx="720" cy="158" r="0.7" opacity="0.6"/>
    <circle cx="760" cy="26"  r="0.5" opacity="0.7"/>
    <circle cx="42"  cy="160" r="0.5" opacity="0.7"/>
    <circle cx="118" cy="162" r="0.3" opacity="0.9"/>
  </g>
</svg>
