<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200" role="img" aria-label="idiolect">
  <title>idiolect</title>
  <!--
    Minimalist typewriter — dark-mode variant. Paper rising from a
    platen, trapezoidal body, two staggered rows of keys, one space
    bar. Line weight 8 throughout for a consistent monoline feel.
  -->
  <g fill="none" stroke="#e2e8f0" stroke-width="8" stroke-linecap="round" stroke-linejoin="round">
    <!-- Paper sheet -->
    <path d="M 64 24 H 136 V 72 H 64 Z" />
    <!-- Two text lines suggesting the paper has been typed on -->
    <line x1="74" y1="40" x2="126" y2="40" stroke-width="5" />
    <line x1="74" y1="54" x2="114" y2="54" stroke-width="5" />
    <!-- Platen / carriage roller -->
    <rect x="28" y="66" width="144" height="22" rx="11" />
    <!-- Typewriter body, trapezoidal -->
    <path d="M 46 90 H 154 L 170 172 H 30 Z" />
    <!-- Space bar -->
    <line x1="72" y1="154" x2="128" y2="154" />
  </g>
  <!-- Keys: top row of four, bottom row of three, staggered -->
  <g fill="#e2e8f0">
    <circle cx="73" cy="114" r="5.5"/>
    <circle cx="91" cy="114" r="5.5"/>
    <circle cx="109" cy="114" r="5.5"/>
    <circle cx="127" cy="114" r="5.5"/>
    <circle cx="82" cy="134" r="5.5"/>
    <circle cx="100" cy="134" r="5.5"/>
    <circle cx="118" cy="134" r="5.5"/>
  </g>
</svg>
